name: Fetch HIVE world snapshot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-hive-world
  cancel-in-progress: true

jobs:
  fetch-hive-world:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull world JSON from mobius-hive
        env:
          TERMINAL_SNAPSHOT_URL: https://mobius-civic-ai-terminal.vercel.app/api/terminal/snapshot-lite
        # Optional: set MOBIUS_HIVE_REPO / MOBIUS_HIVE_BRANCH in repo Variables to override defaults.
        run: bash scripts/mesh/fetch-hive-world.sh

      - name: Commit snapshot (if changed)
        run: |
          git config user.name "mobius-bot"
          git config user.email "bot@mobius.systems"
          git add public/world
          if git diff --staged --quiet; then
            echo "No HIVE world snapshot changes"
          else
            git commit -m "chore(mesh): sync HIVE world snapshot [skip ci]"
            git push
          fi
