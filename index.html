    <!-- robots handled by /public/robots.txt + vercel.json headers -->
    <!-- CSP handled server-side in vercel.json — do not duplicate here -->

    <!--
      EPICON: Removed CDN Tailwind (cdn.tailwindcss.com).
      Tailwind is now bundled via PostCSS/Vite at build time.
      This removes the runtime CDN dependency and closes the CSP
      'unsafe-eval' requirement that cdn.tailwindcss.com needs.
    -->

    <!--
      TLS handshake for the terminal bridge + primary lab origins during
      HTML parse so the first snapshot fetch isn't paying for a cold
      handshake on top of a Render cold-start. Fonts stay async.
    -->
    <!-- Preconnect only what first paint touches; dns-prefetch the rest. -->
    <link rel="preconnect" href="https://mobius-civic-ai-terminal.vercel.app" />
    <link rel="dns-prefetch" href="https://oaa-api-library.onrender.com" />
